name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml
    permissions:
      contents: read

  release:
    needs: test
    strategy:
      matrix:
        include:
          - arch: x64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Architecture
        run: uname -m

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Snapcraft
        run: sudo snap install snapcraft --classic

      - name: Install dependencies
        run: npm install

      - name: Build Snap and DEB (${{ matrix.arch }})
        run: |
          npx electron-builder --linux snap --${{ matrix.arch }} --publish never
          npx electron-builder --linux deb --${{ matrix.arch }} --publish never
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SNAPCRAFT_BUILD_ENVIRONMENT: host
          USE_SNAPCRAFT_DESTRUCTIVE_MODE: true
          SNAPCRAFT_DESTRUCTIVE_MODE: true

      - name: Extract Release Notes
        if: matrix.arch == 'x64'
        id: release_notes
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${TAG_VERSION#v}
          awk "/^## \[$VERSION\]/{p=1; next} /^## \[/{p=0} p" CHANGELOG.md > release_notes.md
          cat release_notes.md

      - name: Upload to Snap Store
        uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
        with:
          snap: dist/*.snap
          release: stable

      - name: Create/Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            dist/*.deb
            dist/*.snap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
